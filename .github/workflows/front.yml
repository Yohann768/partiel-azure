name: Deploy Frontend to Azure Blob Storage

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  deploy:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Upload
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name frontazure \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
              --destination '$web' \
              --source ./frontend \
              --overwrite
