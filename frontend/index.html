<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Mon App Cloud</title>
  </head>
  <body>
    <h1>Bienvenue sur mon TP Azure !</h1>
    <p>
      Message du back-end :
      <strong id="message" style="color: blue">Chargement...</strong>
    </p>

    <script>
      const backendUrl =
        "https://azuretyf-a9duaxfbc5cxd3ew.spaincentral-01.azurewebsites.net/api/test";

      fetch(backendUrl)
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("message").innerText = data.message;
        })
        .catch((error) => {
          document.getElementById("message").innerText =
            "Erreur de connexion au back-end";
          document.getElementById("message").style.color = "red";
        });
    </script>
  </body>
</html>
